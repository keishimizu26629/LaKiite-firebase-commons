name: Firebase Hosting Deploy

on:
  push:
    branches: [dev, main]
    paths:
      - "public/**"
      - "firebase.json"
      - ".firebaserc"
      - ".github/workflows/firebase-hosting-deploy.yml"
  workflow_dispatch:
    inputs:
      target:
        description: "Firebase project alias to deploy"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - prod

jobs:
  deploy-hosting:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Resolve Firebase project alias
        id: project
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "alias=${{ inputs.target }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "alias=prod" >> "$GITHUB_OUTPUT"
          else
            echo "alias=dev" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy Firebase Hosting
        run: |
          firebase deploy \
            --only hosting \
            --project "${{ steps.project.outputs.alias }}" \
            --token "${{ secrets.FIREBASE_TOKEN }}"
