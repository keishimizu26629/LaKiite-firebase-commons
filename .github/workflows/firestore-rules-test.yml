name: Firebase Security and Functions Tests

on:
  push:
    branches: [main, develop]
    paths:
      - ".github/workflows/firestore-rules-test.yml"
      - "security_rules/firestore/**"
      - "security_rules/storage/**"
      - "tests/**"
      - "functions/**"
      - "package.json"
      - "package-lock.json"
      - "firebase.json"
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/firestore-rules-test.yml"
      - "security_rules/firestore/**"
      - "security_rules/storage/**"
      - "tests/**"
      - "functions/**"
      - "package.json"
      - "package-lock.json"
      - "firebase.json"

jobs:
  test-rules:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Setup Firebase CLI
        run: |
          npm install -g firebase-tools
          firebase --version

      - name: Setup Java for Firebase Emulator
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"

      - name: Cache Firebase Emulators
        uses: actions/cache@v4
        with:
          path: ~/.cache/firebase/emulators
          key: ${{ runner.os }}-firebase-emulators-${{ hashFiles('firebase.json') }}
          restore-keys: |
            ${{ runner.os }}-firebase-emulators-

      - name: Install Firebase Emulators
        run: |
          firebase setup:emulators:firestore
          firebase setup:emulators:storage
          # エミュレーターのバイナリが正しくダウンロードされたか確認
          firebase emulators:exec --only firestore,storage "echo 'Emulator test successful'" || echo "Emulator setup completed"

      - name: Run Firestore and Storage Rules Tests
        run: |
          # IPv6を無効にしてエミュレーターを起動
          export FIRESTORE_EMULATOR_HOST=127.0.0.1:8080
          export FIREBASE_STORAGE_EMULATOR_HOST=127.0.0.1:9199
          # CI専用のテストスクリプトを実行
          npm run emulator:test:ci
        env:
          CI: true
          # IPv6を無効化
          FIRESTORE_EMULATOR_HOST: 127.0.0.1:8080
          FIREBASE_STORAGE_EMULATOR_HOST: 127.0.0.1:9199

      - name: Upload test coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage/lcov.info
          flags: firebase-rules
          name: firebase-rules-coverage
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ matrix.node-version }}
          path: |
            coverage/
            tests/

      - name: Comment PR with test results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            try {
              const summaryPath = path.join(process.cwd(), 'coverage/test-summary.md');
              if (fs.existsSync(summaryPath)) {
                const summary = fs.readFileSync(summaryPath, 'utf8');

                github.rest.issues.createComment({
                  issue_number: context.issue.number,
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  body: `## 🧪 Firebase Security Rules テスト結果\n\n${summary}`
                });
              }
            } catch (error) {
              console.log('テスト結果のコメント投稿に失敗しました:', error);
            }

  test-functions:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"
          cache-dependency-path: functions/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: functions

      - name: Lint Functions
        run: npm run lint
        working-directory: functions

      - name: Build Functions
        run: npm run build
        working-directory: functions

      - name: Test Functions
        run: npm test
        working-directory: functions

  security-check:
    runs-on: ubuntu-latest
    needs: [test-rules, test-functions]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Security audit
        run: |
          echo "🔍 依存関係の脆弱性をチェック中..."
          npm audit --audit-level moderate || {
            echo "⚠️ 警告: 依存関係に脆弱性が検出されました"
            echo "Firebase SDK由来の脆弱性は現在修正待ちです"
            npm audit --audit-level high
          }

      - name: Check for insecure rules patterns
        run: |
          echo "🔍 セキュリティルールの安全性をチェック中..."

          # 危険なパターンをチェック
          SECURITY_ISSUES=0

          # 1. すべてのアクセスを許可する危険なルール
          if grep -r "allow read, write: if true" security_rules/firestore/; then
            echo "❌ 危険: すべてのアクセスを許可するルールが見つかりました"
            SECURITY_ISSUES=$((SECURITY_ISSUES + 1))
          fi

          # 2. 認証チェックの存在確認
          if ! grep -q "request.auth" security_rules/firestore/firestore.rules; then
            echo "❌ 危険: 認証チェックが含まれていません"
            SECURITY_ISSUES=$((SECURITY_ISSUES + 1))
          fi

          # 3. 危険なallow文のパターン
          if grep -r "allow.*if true" security_rules/firestore/ | grep -v "// テスト用" | grep -v "// 安全"; then
            echo "⚠️ 警告: 無条件許可のルールが見つかりました"
          fi

          # 4. resource.dataの適切な使用確認
          if ! grep -q "resource.data" security_rules/firestore/firestore.rules; then
            echo "⚠️ 警告: resource.dataを使用したデータ検証が見つかりません"
          fi

          # 5. request.resource.dataの適切な使用確認
          if ! grep -q "request.resource.data" security_rules/firestore/firestore.rules; then
            echo "⚠️ 警告: request.resource.dataを使用した入力検証が見つかりません"
          fi

          # 6. 管理者権限の適切な保護
          if grep -q "admin" security_rules/firestore/firestore.rules; then
            if ! grep -q "request.auth.token.admin" security_rules/firestore/firestore.rules; then
              echo "⚠️ 警告: 管理者権限の適切な検証が不足している可能性があります"
            fi
          fi

          # 結果の判定
          if [ $SECURITY_ISSUES -gt 0 ]; then
            echo "❌ $SECURITY_ISSUES 個の重大なセキュリティ問題が見つかりました"
            exit 1
          else
            echo "✅ セキュリティルールの基本的なチェックが完了しました"
          fi

  deploy-rules:
    runs-on: ubuntu-latest
    needs: [test-rules, test-functions, security-check]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Setup Firebase CLI
        run: npm install -g firebase-tools

      - name: Check Firebase deployment secrets
        id: firebase-secrets
        run: |
          if [ -z "$FIREBASE_TOKEN" ] || [ -z "$FIREBASE_PROJECT_ID" ]; then
            echo "should_deploy=false" >> "$GITHUB_OUTPUT"
            echo "⚠️ Firebase deployment secrets are not configured. Skipping Firestore Rules deployment."
          else
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
          fi
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}

      - name: Deploy Firestore Rules
        if: steps.firebase-secrets.outputs.should_deploy == 'true'
        run: |
          echo "🚀 Firestoreセキュリティルールをデプロイ中..."
          firebase deploy --only firestore:rules --token "${{ secrets.FIREBASE_TOKEN }}" --project "${{ secrets.FIREBASE_PROJECT_ID }}"
          echo "✅ デプロイが完了しました"
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}

      - name: Skip Firestore Rules deployment
        if: steps.firebase-secrets.outputs.should_deploy == 'false'
        run: echo "Firestore Rules deployment skipped because Firebase deployment secrets are not configured."
